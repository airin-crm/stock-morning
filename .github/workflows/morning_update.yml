name: 毎朝の市場データ更新

on:
  schedule:
    - cron: '30 23 * * 0-4'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install yfinance feedparser numpy beautifulsoup4

      - name: HTML生成
        run: python github_morning.py

      - name: コミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "auto: $(date '+%Y-%m-%d %H:%M')"
          git push
